version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: luxeaura_db
    restart: always
    environment:
      POSTGRES_USER: luxe_admin
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: luxeaura_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxeaura_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://luxe_admin:SecretPassword123!@db:5432/luxeaura_prod
      SECRET_KEY: 7b8e9f2a4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxeaura_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
